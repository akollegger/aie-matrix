  <rect x="20" y="90" width="1160" height="580" fill="#0f1318" stroke="#2a3544" />
  <text x="40" y="120" fill="#e2e8f0" font-size="16" font-weight="600" font-family="system-ui,sans-serif">Ghost interiority</text>
  <text x="40" y="145" fill="#94a3b8" font-size="11" font-family="system-ui,sans-serif">Paired only, no map, no message input (FR-012)</text>
  <line x1="40" y1="160" x2="1120" y2="160" stroke="#1e2836" />
  <text x="40" y="190" fill="#64748b" font-size="12" font-weight="600" font-family="system-ui,sans-serif">Inventory</text>
  <rect x="40" y="202" width="500" height="100" fill="#11161d" stroke="#2a3544" />
  <text x="56" y="256" fill="#5c6b7d" font-size="12" font-family="system-ui,sans-serif">loading (IC-003)</text>
  <text x="600" y="190" fill="#64748b" font-size="12" font-weight="600" font-family="system-ui,sans-serif">Active goal</text>
  <rect x="600" y="202" width="560" height="100" fill="#11161d" stroke="#2a3544" />
  <text x="616" y="256" fill="#5c6b7d" font-size="12" font-family="system-ui,sans-serif">loading (IC-003)</text>
  <text x="40" y="330" fill="#64748b" font-size="12" font-weight="600" font-family="system-ui,sans-serif">Memories</text>
  <rect x="40" y="342" width="1120" height="200" fill="#11161d" stroke="#2a3544" />
  <text x="56" y="380" fill="#5c6b7d" font-size="11" font-family="system-ui,sans-serif">* [stub] episodic line ...</text>
  <text x="56" y="404" fill="#5c6b7d" font-size="11" font-family="system-ui,sans-serif">* [stub] until interiority API (IC-003)</text>
  <text x="40" y="600" fill="#5c6b7d" font-size="11" font-family="system-ui,sans-serif">Escape returns to Partner (FR-014)</text>
  <text x="40" y="652" fill="#3d4a5c" font-size="10" font-family="system-ui,sans-serif">GhostPanel: InventoryList, GoalSummary, Memories (component names in tasks)</text>
