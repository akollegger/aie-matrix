<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-label="Ghost scale: interiority, game-inspired but not a game copy">
  <title>Ghost (0:100): no map, structured interiority (inventory, active goal, memories)</title>
  <rect width="100%" height="100%" fill="#0b0d10" />
  <text x="24" y="40" fill="#8b9cb3" font-family="system-ui,sans-serif" font-size="18" font-weight="600">Ghost scale</text>
