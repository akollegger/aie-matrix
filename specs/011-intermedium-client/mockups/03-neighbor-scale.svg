<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-label="Neighbor: world context plus 7-hex cluster zoom">
  <title>Neighbor (50:50): world map context and zoomed 7-hex cluster</title>
  <defs>
    <pattern id="hexWorld" width="20" height="18" patternUnits="userSpaceOnUse">
      <path d="M10 0 L18 5 L18 13 L10 18 L0 13 L0 5 Z" fill="none" stroke="#1e2836" stroke-width="0.4" />
    </pattern>
    <pattern id="hexCluster" width="72" height="62" patternUnits="userSpaceOnUse">
      <path d="M36 2 L64 20 L64 44 L36 60 L4 44 L4 20 Z" fill="none" stroke="#5c6b7d" stroke-width="1" />
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#0b0d10" />
  <rect x="0" y="0" width="1200" height="700" fill="url(#hexWorld)" opacity="0.5" />
  <g transform="translate(100, 40) scale(1.15)">
  <rect x="0" y="0" width="1200" height="700" fill="url(#hexCluster)" opacity="0.45" />
  </g>
  <g stroke-width="1.4">
    <path d="M300 300 L360 340 L360 400 L300 440 L240 400 L240 340 Z" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" />
    <path d="M360 360 L420 400 L420 460 L360 500 L300 460 L300 400 Z" fill="none" stroke="#4b5c6f" />
    <path d="M240 360 L300 400 L300 460 L240 500 L180 460 L180 400 Z" fill="none" stroke="#4b5c6f" />
    <path d="M300 400 L360 440 L360 500 L300 540 L240 500 L240 440 Z" fill="none" stroke="#4b5c6f" />
    <path d="M180 400 L240 440 L240 500 L180 540 L120 500 L120 440 Z" fill="none" stroke="#4b5c6f" />
    <path d="M300 300 L360 340 L300 400 L240 340 Z" fill="none" stroke="#4b5c6f" />
    <path d="M360 340 L420 380 L360 400 L300 400 Z" fill="none" stroke="#4b5c6f" />
  </g>
  <circle cx="300" cy="400" r="5" fill="#6ee7b7" />
  <rect x="16" y="12" width="450" height="50" rx="6" fill="#0b0d10" fill-opacity="0.82" stroke="#2a3544" />
  <text x="28" y="35" fill="#8b9cb3" font-family="system-ui,sans-serif" font-size="15" font-weight="600">Neighbor (50:50) - cluster zoom</text>
  <text x="28" y="52" fill="#5c6b7d" font-family="system-ui,sans-serif" font-size="9">Background: world grid; center: 7-hex ring at larger cell size. Both read as one view.</text>
  <rect x="24" y="620" width="110" height="64" fill="#0b0d10" fill-opacity="0.8" stroke="#334155" />
  <rect x="30" y="626" width="98" height="40" fill="url(#hexWorld)" opacity="0.7" />
  <text x="32" y="678" fill="#5c6b7d" font-size="7" font-family="system-ui,sans-serif">world (inset)</text>
  <text x="150" y="660" fill="#94a3b8" font-size="9" font-family="system-ui,sans-serif">lazy-follow on focus (FR-015)</text>
  <rect x="600" y="0" width="600" height="700" fill="#141a22" fill-opacity="0.9" stroke="#38bdf8" stroke-opacity="0.2" />
  <text x="628" y="40" fill="#94a3b8" font-size="13" font-weight="600" font-family="system-ui,sans-serif">Proximity panel (overlay)</text>
  <line x1="620" y1="52" x2="1150" y2="52" stroke="#2a3544" />
  <text x="628" y="88" fill="#94a3b8" font-size="11" font-family="system-ui,sans-serif">* activity lines ...</text>
</svg>
