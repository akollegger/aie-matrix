<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Scales: zoom level and Partner 3-4">
  <title>Intermedium: each scale zooms the H3 view; Area-Neighbor-Partner show world+local grids; Partner adds 3-4 and 3D cloud</title>
  <defs>
    <pattern id="whex" width="32" height="28" patternUnits="userSpaceOnUse">
      <path d="M16 1 L28 8 L28 20 L16 27 L2 20 L2 8 Z" fill="none" stroke="#3d4a5c" stroke-width="0.8" />
    </pattern>
    <pattern id="tiny" width="10" height="9" patternUnits="userSpaceOnUse">
      <path d="M5 0 L9 3 L9 6 L5 8 L0 6 L0 3 Z" fill="none" stroke="#1e2836" stroke-width="0.3" />
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#5c6b7d" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#0b0d10" />
  <text x="32" y="44" fill="#8b9cb3" font-family="system-ui,sans-serif" font-size="20" font-weight="600">Scales: camera zoom and grid levels</text>
  <text x="32" y="72" fill="#5c6b7d" font-family="system-ui,sans-serif" font-size="12">Map=world; Area/Neighbor/Partner = zoom in + (where shown) world grid + local grid. Partner: one cell, high 3/4, 3D point cloud, tile underfoot updates.</text>
  <g font-family="system-ui,sans-serif" font-size="10">
    <text x="100" y="118" text-anchor="middle" fill="#8b9cb3" font-size="11" font-weight="600">Map</text>
    <rect x="20" y="128" width="160" height="200" fill="#11161d" />
    <rect x="20" y="128" width="160" height="200" fill="url(#whex)" opacity="0.85" />
    <text x="100" y="310" text-anchor="middle" fill="#5c6b7d" font-size="8">fleet zoom, overhead</text>
    <text x="380" y="118" text-anchor="middle" fill="#8b9cb3" font-size="11" font-weight="600">Area</text>
    <rect x="300" y="128" width="80" height="200" fill="url(#tiny)" opacity="0.4" />
    <rect x="360" y="150" width="100" height="160" fill="url(#whex)" opacity="0.7" />
    <rect x="410" y="128" width="50" height="200" fill="#141a22" fill-opacity="0.88" />
    <text x="360" y="310" text-anchor="middle" fill="#5c6b7d" font-size="8">world+region</text>
    <text x="660" y="118" text-anchor="middle" fill="#8b9cb3" font-size="11" font-weight="600">Neighbor</text>
    <rect x="580" y="128" width="70" height="200" fill="url(#tiny)" opacity="0.4" />
    <rect x="630" y="150" width="100" height="160" fill="url(#whex)" opacity="0.65" />
    <rect x="700" y="128" width="50" height="200" fill="#141a22" fill-opacity="0.88" />
    <text x="650" y="310" text-anchor="middle" fill="#5c6b7d" font-size="8">world+7-hex</text>
    <text x="1000" y="118" text-anchor="middle" fill="#8b9cb3" font-size="11" font-weight="600">Partner</text>
    <rect x="860" y="128" width="80" height="200" fill="url(#tiny)" opacity="0.35" />
    <polygon points="940,300  1020,300  1050,180  910,200" fill="#1a222c" stroke="#38bdf8" stroke-opacity="0.4" />
    <g fill="#6ee7b7" opacity="0.85" transform="translate(980, 220)">
      <circle r="2" cy="0" cx="0" />
      <circle r="1.5" cy="6" cx="-4" />
      <circle r="1.2" cy="-5" cx="3" />
    </g>
    <text x="1000" y="310" text-anchor="middle" fill="#5c6b7d" font-size="7">1 hex 3/4+3D</text>
    <rect x="1020" y="128" width="80" height="200" fill="#0f1318" fill-opacity="0.9" />
    <text x="1000" y="170" text-anchor="middle" fill="#94a3b8" font-size="6">+overlay</text>
    <text x="1280" y="118" text-anchor="middle" fill="#8b9cb3" font-size="11" font-weight="600">Ghost</text>
    <rect x="1180" y="128" width="200" height="200" fill="#0f1318" stroke="#2a3544" />
    <text x="1280" y="230" text-anchor="middle" fill="#5c6b7d" font-size="8">interiority</text>
  </g>
  <text x="220" y="255" text-anchor="middle" fill="#94a3b8" font-size="16" font-family="system-ui,sans-serif">&#8594;</text>
  <text x="500" y="255" text-anchor="middle" fill="#94a3b8" font-size="16" font-family="system-ui,sans-serif">&#8594;</text>
  <text x="800" y="255" text-anchor="middle" fill="#94a3b8" font-size="16" font-family="system-ui,sans-serif">&#8594;</text>
  <text x="1120" y="255" text-anchor="middle" fill="#94a3b8" font-size="16" font-family="system-ui,sans-serif">&#8594;</text>
  <text x="32" y="400" fill="#3d4a5c" font-size="11" font-family="system-ui,sans-serif" font-style="italic">Partner: oblique camera may start here; ghost volume fixed, hex floor retargets to current h3Index (spec FR-025).</text>
  <text x="32" y="500" fill="#5c6b7d" font-size="14" font-family="system-ui,sans-serif" font-weight="600">Zoom out: Escape</text>
  <line x1="32" y1="540" x2="200" y2="480" stroke="#5c6b7d" stroke-width="1" marker-end="url(#arrow)" />
  <line x1="32" y1="780" x2="1560" y2="780" stroke="#1e2836" />
  <text x="32" y="820" fill="#1e3a4a" font-size="9" font-family="system-ui,sans-serif">00-scale-transitions.svg - zoom + grid levels + Partner 3/4</text>
  <line x1="32" y1="820" x2="32" y2="780" stroke="#1e2836" />
  <line x1="32" y1="820" x2="200" y2="820" stroke="#1e2836" />
</svg>
