<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-label="Partner: single H3 cell, high 3/4 view, 3D ghost point cloud, overlay">
  <title>Partner: one hex underfoot, high 3-4 camera, 3D point cloud fixed; tile swaps on move; conversation overlay</title>
  <defs>
    <pattern id="hexWorld" width="18" height="16" patternUnits="userSpaceOnUse">
      <path d="M9 0 L16 5 L16 11 L9 16 L0 11 L0 5 Z" fill="none" stroke="#1e2836" stroke-width="0.35" />
    </pattern>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141a22" />
      <stop offset="100%" stop-color="#0a0c10" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#0b0d10" />
  <rect x="0" y="0" width="900" height="700" fill="url(#hexWorld)" opacity="0.4" />
  <text x="24" y="680" fill="#3d4a5c" font-size="8" font-family="system-ui,sans-serif">Distant: faint world grid (context) - same canvas</text>
  <g transform="translate(40, 80)">
    <text x="0" y="0" fill="#8b9cb3" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Partner scene - high 3/4</text>
    <text x="0" y="18" fill="#5c6b7d" font-family="system-ui,sans-serif" font-size="9">Camera tilted from overhead (oblique may begin here). Single H3 cell in focus.</text>
  </g>
  <g transform="translate(120, 200)">
    <polygon points="0,200  520,200  580,80  40,40" fill="url(#floor)" stroke="#334155" stroke-width="1" opacity="0.95" />
    <g transform="translate(260, 130) skewX(-8) scale(1, 0.55)">
      <path d="M0 -70 L60 -40 L60 30 L0 60 L-60 30 L-60 -40 Z" fill="none" stroke="#38bdf8" stroke-width="2.5" />
      <path d="M0 -70 L60 -40 L60 30 L0 60 L-60 30 L-60 -40 Z" fill="rgba(56,189,248,0.05)" />
    </g>
    <text x="200" y="220" fill="#5c6b7d" font-size="9" font-family="system-ui,sans-serif">one hex = cell ghost stands on; hex swaps when h3Index updates</text>
  </g>
  <g transform="translate(380, 200)">
    <text x="0" y="-20" fill="#6ee7b7" font-size="10" font-family="system-ui,sans-serif">3D point cloud (paired ghost)</text>
    <g fill="#6ee7b7" opacity="0.9">
      <circle cx="0" cy="40" r="3" />
      <circle cx="-12" cy="32" r="2.5" />
      <circle cx="10" cy="28" r="2" />
      <circle cx="-5" cy="18" r="2.5" />
      <circle cx="8" cy="48" r="2" />
      <circle cx="0" cy="25" r="1.5" />
      <circle cx="-8" cy="45" r="1.5" />
      <circle cx="6" cy="10" r="1.2" />
      <circle cx="-3" cy="5" r="1" />
      <circle cx="4" cy="55" r="1.8" />
    </g>
    <g fill="#38bdf8" opacity="0.5">
      <circle cx="-4" cy="30" r="1.2" />
      <circle cx="4" cy="22" r="1" />
      <circle cx="0" cy="35" r="0.8" />
    </g>
    <text x="-40" y="85" fill="#94a3b8" font-size="8" font-family="system-ui,sans-serif" font-style="italic">cloud fixed in view; not dragged across map</text>
  </g>
  <rect x="20" y="12" width="500" height="40" rx="5" fill="#0b0d10" fill-opacity="0.85" stroke="#2a3544" />
  <text x="32" y="38" fill="#8b9cb3" font-size="12" font-family="system-ui,sans-serif" font-weight="600">Partner (20:80) - 3/4 + single cell + 3D cloud</text>
  <rect x="280" y="0" width="920" height="700" fill="#0a0d12" fill-opacity="0.87" stroke="#334155" />
  <text x="300" y="32" fill="#e2e8f0" font-size="12" font-family="system-ui,sans-serif" font-weight="600">GhostStatusWidget: tile + bearing (live h3 under cloud)</text>
  <line x1="300" y1="44" x2="1150" y2="44" stroke="#1e2836" />
  <text x="300" y="100" fill="#94a3b8" font-size="12" font-family="system-ui,sans-serif">ConversationThread (overlay)</text>
  <text x="300" y="200" fill="#5c6b7d" font-size="10" font-family="system-ui,sans-serif">A2A messages ...</text>
  <rect x="300" y="600" width="700" height="40" rx="4" fill="#0b0f14" stroke="#334155" />
  <text x="312" y="626" fill="#64748b" font-size="12" font-family="system-ui,sans-serif">Message ...</text>
  <rect x="1000" y="600" width="90" height="40" rx="4" fill="#1e3a4a" stroke="#38bdf8" />
  <text x="1020" y="626" fill="#7dd3fc" font-size="12" font-family="system-ui,sans-serif">Send</text>
</svg>
